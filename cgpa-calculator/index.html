<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>CGPA Calculator</h1>

            <div id="semesterInputs">
                <div class="input-group">
                    <input type="number" step="0.01" placeholder="Enter SGPA" class="sgpa">
                </div>
            </div>

            <button onclick="addSemester()">+ Add Semester</button>
            <button onclick="calculateCGPA()">Calculate CGPA</button>

            <div class="result">
                <h2 id="cgpaResult">CGPA: 0.00</h2>
            </div>

            <div class="footer">
                <p><strong>Prerna Dutta</strong></p>
                <p>your-prernadutta142404@gmail.com.com</p>

                <a href="https://digitalheroesco.com" target="_blank">
                    <button class="hero-btn">Built for Digital Heroes</button>
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
